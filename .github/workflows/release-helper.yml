name: Release Helper Bridge

on:
  repository_dispatch:
    types: [release-helper]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. helper-v0.1.12)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          repository: DoCoreTeam/doteam
          token: ${{ secrets.RELEASE_TOKEN }}
          ref: ${{ github.event.client_payload.tag || inputs.tag }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm --filter @doteam/helper build

      - name: Build & publish (${{ matrix.platform }})
        run: pnpm --filter @doteam/helper dist --publish always
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify notarization (macOS only)
        if: matrix.platform == 'mac'
        run: |
          APP_PATH=$(find apps/helper/release -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in release directory"
            exit 1
          fi
          echo "Verifying: $APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl --assess --verbose=4 --type execute "$APP_PATH"

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release as Latest
        run: |
          TAG="${{ github.event.client_payload.tag || inputs.tag }}"
          gh release edit "$TAG" \
            --draft=false \
            --latest \
            --repo DoCoreTeam/doteam-helper
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
